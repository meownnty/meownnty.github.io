<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meownnty Studio</title>
  <!-- Google Fonts: add Orbitron for headings -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== CANVAS FOR PARTICLE BACKGROUND ===== -->
  <canvas id="bgCanvas"></canvas>

  <!-- ===== NAVIGATION ===== -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="#" class="nav-logo">
        <img src="Assets/images/your-logo.png" alt="Meownnty Studios" height="40">
      </a>
      <ul class="nav-links">
        <li><a href="#portfolio">Work</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#shop">Shop</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
      <div class="nav-social">
        <a href="#" target="_blank"><img src="assets/icons/instagram.svg" alt="IG"></a>
        <a href="#" target="_blank"><img src="assets/icons/twitter.svg" alt="X"></a>
        <a href="#" target="_blank"><img src="assets/icons/etsy.svg" alt="Etsy"></a>
      </div>
    </div>
  </nav>

  <!-- ===== HERO ===== -->
  <section class="hero">
    <div class="hero-content">
      <h1>
        <span class="glitch-text" data-text="MEOWNNTY">MEOWNNTY</span>
        <span class="neon-sub">STUDIOS</span>
      </h1>
      <p class="hero-tagline">
        Game Dev · 3D Art · VTuber Models · <span class="highlight">Chaos</span>
      </p>
      <div class="hero-buttons">
        <a href="#portfolio" class="btn btn-primary">View Work</a>
        <a href="#shop" class="btn btn-secondary">Shop</a>
      </div>
    </div>
    <!-- Optional: a floating mascot image -->
    <div class="hero-mascot">
      <img src="Assets/images/your-character.png" alt="Mascot">
    </div>
  </section>

  <!-- ===== PORTFOLIO (with filters) ===== -->
  <section id="portfolio" class="portfolio">
    <h2 class="section-title">// PROJECTS</h2>
    <div class="filter-buttons">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="game">Games</button>
      <button class="filter-btn" data-filter="3d">3D Art</button>
      <button class="filter-btn" data-filter="vtuber">VTuber</button>
    </div>
    <div class="cards-container">
      <!-- Your existing cards, but add a data-category attribute -->
      <div class="card project-card" data-category="game">
        <!-- ... -->
      </div>
      <!-- ... -->
    </div>
  </section>

  <!-- ===== SHOP LINKS (minimal) ===== -->
  <section id="shop" class="shop-section">
    <h2 class="section-title">// SHOP</h2>
    <p>Find my physical products and commissions on:</p>
    <div class="shop-links">
      <a href="#" class="shop-link">Etsy</a>
      <a href="#" class="shop-link">VGen</a>
      <a href="#" class="shop-link">Ko‑fi</a>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer>
    <p>🐱 Meownnty Studio · Made with <span class="heart">♥</span> and neon pink chaos</p>
    <p class="footer-colors">#FF0073 · #00FF40 · #0A0A0A</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
